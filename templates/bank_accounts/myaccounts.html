<!DOCTYPE html>

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contas</title>
</head>
<body>

```
<h1>Contas Registradas</h1>

<div>
    {% for conta in contas %}
        <div>
            <div>
                <h3>{{ conta.banco }}</h3>
                <p>{{ conta.tipo }}</p>
                <p>{{ conta.numero }}</p>
            </div>
        </div>
    {% endfor %}
</div>

<div>
    <button>+ Adicionar Conta</button>
</div>
```

</body>
</html>
