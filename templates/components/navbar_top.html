{% load static %}
<header class="navbar">
  <div class="navbar__inner">

    <a href="/" class="navbar__brand" aria-label="Organizei">
        <img src="{% static 'img/logo.png' %}" alt="Organizei" width="60" height="58">
    </a>
    <div class="main_section" aria-label="Navegação principal">
        <nav class="navbar__nav">
        <a href="{% url 'transactions:list' %}" class="button-glass {% if request.resolver_match.namespace != 'goals' %}button-glass--active{% endif %}">
            Minha Carteira
        </a>
        <a href="{% url 'goals:list' %}" class="button-glass {% if request.resolver_match.namespace == 'goals' %}button-glass--active{% endif %}" {% if request.resolver_match.namespace == 'goals' %}aria-current="page"{% endif %}>
            Objetivos
        </a>
        <a href="#" class="button-glass">Orçamentos</a>
        <a href="#" class="button-glass">Assinaturas</a>
        </nav>

        <div class="navbar__actions">
        <button class="icon-btn" aria-label="Notificações">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
        </button>
        <!-- TODO: Isso aqui deve levar para configurações de conta, porém, está temporariamente como logout por comodidade -->
        <a href="{% url 'accounts:logout' %}" class="icon-btn" aria-label="Sair da conta">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
            </svg>
        </a>
        </div>
    </div>
  </div>
  <div class="navbar__divider"></div>
</header>
