<h2>Definir limite mensal</h2>

{% if messages %}
    {% for message in messages %}
        <p style="color: green;">{{ message }}</p>
    {% endfor %}
{% endif %}

<form method="POST">
    {% csrf_token %}
    
    <label>Limite:</label>
    <input 
        type="number" 
        step="0.01" 
        name="limit" 
        min="0.01"
        value="{{ budget.limit|default:'' }}"
        required
    >

    <button type="submit">Salvar</button>
</form>
